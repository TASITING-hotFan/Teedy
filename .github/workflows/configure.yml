name: Teedy CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'
    - name: Build with Maven
      run: mvn clean install pmd:pmd test -Dmaven.test.failure.ignore=true
    - name: Generate JavaDoc
      run: mvn javadoc:jar -DskipTests
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-outputs
        path: |
          **/target/*.jar
          **/target/pmd.xml
