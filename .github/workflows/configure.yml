name: Teedy CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    # 1. 使用 install 将子模块本地化，彻底解决依赖找不到的问题
    - name: Maven Build & Install
      run: mvn clean install -DskipTests

    # 2. 执行 PMD 代码检查
    - name: Run PMD Code Analysis
      run: mvn pmd:pmd -Dpmd.failOnViolation=false

    # 3. 运行测试并生成报告
    - name: Run Tests
      run: mvn test -Dmaven.test.failure.ignore=true

    # 4. 生成 JavaDoc 项目文档（禁用严苛的语法报错拦截，确保能打包成功）
    - name: Generate JavaDoc
      run: mvn javadoc:jar -Dadditionalparam="-Xdoclint:none" -Dmaven.javadoc.failOnError=false

    # 5. 归档实验要求的输出结果
    - name: Archive Production Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: teedy-build-artifacts
        path: |
          **/target/*.jar
          **/target/site/**
          **/target/surefire-reports/*.html
