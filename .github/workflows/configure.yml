name: Teedy CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Maven Build & Package
      run: mvn clean package -DskipTests

    - name: Run PMD Code Analysis
      run: mvn pmd:pmd -Dpmd.failOnViolation=false

    - name: Run Tests
      run: mvn test -Dmaven.test.failure.ignore=true

    - name: Generate JavaDoc
      run: mvn javadoc:jar -Dmaven.javadoc.skip=false

    - name: Archive Production Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: teedy-build-artifacts
        path: |
          **/target/*.jar
          **/target/site/**
          **/target/surefire-reports/*.html
